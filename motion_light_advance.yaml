blueprint:
  name: Motion-activated Light Advanced
  description: Turn on a light under various conditions when motion is detected.
  domain: automation
  source_url: https://github.com/home-assistant/core/blob/dev/homeassistant/components/automation/blueprints/motion_light.yaml
  author: Ralf Perkuhn (original by Home Assistant)
  input:
    motion_entity:
      name: Motion Sensor
      selector:
        entity:
          filter:
            - device_class: occupancy
              domain: binary_sensor
            - device_class: motion
              domain: binary_sensor
    lux_entity:
      name: Illuminance Sensor
      selector:
        entity:
          domain:
            - sensor
          device_class:
            - illuminance
    lux_level:
      name: Illuminance level
      description:
        If lux is below this value and motion is detected, the light will
        turn on.
      default: 100
      selector:
        number:
          min: 0.0
          max: 1000.0
          step: 1.0
          mode: slider
    light_target_1:
      name: Light standard
      description: Light to switch on in normal condition
      selector:
        target:
          entity:
            domain: light
    nighttime_helper:
      name: Night silence helper
      description: Should it be considered that night silence occurs? Create a binary_sensor
        helper and automate it to set/unset.
      selector:
        entity:
          domain:
          - input_boolean
          multiple: false
    light_target_2:
      name: Light alternative
      description: Light to switch on in alternative condition
      selector:
        target:
          entity:
            domain: light
    no_motion_wait:
      name: Wait time
      description: Time to leave the light on after last motion is detected.
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds

# If motion is detected within the delay,
# we restart the script.
mode: restart
max_exceeded: silent

triggers:
  trigger: state
  entity_id: !input motion_entity
  from: "off"
  to: "on"

actions:
  - alias: "Turn on the light"
    action: light.turn_on
    target: !input light_target_1
  - alias: "Wait until there is no motion from device"
    wait_for_trigger:
      trigger: state
      entity_id: !input motion_entity
      from: "on"
      to: "off"
  - alias: "Wait the number of seconds that has been set"
    delay: !input no_motion_wait
  - alias: "Turn off the light"
    action: light.turn_off
    target: !input light_target_1
